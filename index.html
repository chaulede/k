<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Flashcards - Adaptive Learning</title>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4A90E2; --success: #50C878; --warning: #FFB347; --bg: #F5F7FA; --card-back: #FFFDF0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* Dropdown Selector */
        .top-nav { margin-bottom: 15px; background: white; padding: 12px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 10px; z-index: 10; }
        select { border: 2px solid var(--primary); border-radius: 10px; padding: 5px; color: var(--primary); font-weight: bold; outline: none; background: transparent; }

        /* Score Board */
        .score-board { margin-bottom: 15px; display: flex; gap: 20px; font-weight: bold; color: #555; }
        .score-item { background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Flashcard Area */
        .card-container { perspective: 1000px; width: 320px; height: 450px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card.is-flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 5px solid white; overflow: hidden; }
        
        .front img { width: 95%; height: 95%; object-fit: contain; }
        .back { transform: rotateY(180deg); background: var(--card-back); }
        .pinyin { font-size: 28px; color: var(--primary); margin-bottom: 5px; font-weight: 500; }
        .chinese { font-size: 85px; margin: 0; color: #333; }
        .speaker { font-size: 50px; margin-top: 20px; }

        /* Controls */
        .controls { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .nav-buttons { display: flex; align-items: center; gap: 10px; }
        .score-buttons { display: flex; gap: 10px; }
        
        .btn { padding: 10px 22px; border-radius: 30px; border: none; color: white; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--warning); }
        .btn-grey { background: #888; }
        
        #counter { font-weight: bold; color: #666; min-width: 80px; text-align: center; font-family: monospace; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; font-weight: bold; color: var(--primary); font-size: 22px; }
    </style>
</head>
<body>

    <div id="loader">Syncing Data...</div>

    <div id="app" style="display:none; text-align: center;">
        <div class="top-nav">
            <label style="color:#666; font-weight:bold;">Select Unit: </label>
            <select id="part-selector" onchange="switchPart(this.value)">
                <option value="1">Unit 1 (1-100)</option>
                <option value="2">Unit 2 (101-200)</option>
                <option value="3">Unit 3 (201-282)</option>
            </select>
        </div>

        <div class="score-board">
            <div class="score-item">✅ Mastered: <span id="mastered-count">0</span></div>
            <div class="score-item">🔄 Review: <span id="review-count">0</span></div>
        </div>
        
        <div class="card-container" onclick="toggleFlip()">
            <div class="card" id="card">
                <div class="face front"><img id="card-img" src="" alt="Loading..."></div>
                <div class="face back">
                    <p class="pinyin" id="card-py"></p>
                    <h1 class="chinese" id="card-zh"></h1>
                    <div class="speaker" onclick="speak(event)">🔊</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="score-buttons" id="score-btns" style="visibility: hidden;">
                <button class="btn btn-orange" onclick="markCard('review')">Practice More ❌</button>
                <button class="btn btn-green" onclick="markCard('mastered')">Got It! ✅</button>
            </div>
            
            <div class="nav-buttons">
                <button class="btn btn-blue" onclick="changeCard(-1)">Prev</button>
                <span id="counter">1 / 0</span>
                <button class="btn btn-blue" onclick="changeCard(1)">Next</button>
            </div>
            
            <button class="btn btn-grey" style="margin-top:10px;" onclick="resetProgress()">Reset All Progress</button>
            <p style="color:#999; font-size:13px; margin-top:15px;">Tips: Space to flip | Arrow keys to switch</p>
        </div>
    </div>

    <script>
        let currentPart = "1";
        let wordData = [];
        let currentIndex = 0;
        let scores = { mastered: [], review: [] }; 
        const { pinyin } = pinyinPro;

        // 1. Initial Logic
        async function init() {
            const savedPart = localStorage.getItem('flashcard_part');
            const savedIndex = localStorage.getItem('flashcard_index');
            const savedScores = localStorage.getItem('flashcard_scores');

            if (savedScores) scores = JSON.parse(savedScores);
            updateScoreDisplay();

            if (savedPart && savedIndex) {
                if (confirm(`Resume from last session? (Part ${savedPart}, Card ${parseInt(savedIndex)+1})`)) {
                    currentPart = savedPart;
                    currentIndex = parseInt(savedIndex);
                    document.getElementById('part-selector').value = currentPart;
                }
            }
            loadContent(currentPart, false); 
        }

        // 2. Data Fetching
        async function loadContent(partNum, resetIndex = true) {
            document.getElementById('loader').style.display = 'flex';
            currentPart = partNum;
            if (resetIndex) currentIndex = 0;

            try {
                const response = await fetch(`words${partNum}.txt`);
                const text = await response.text();
                const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
                
                wordData = lines.map((word, index) => ({ text: word, imgId: index + 1 }));

                updateUI();
                saveProgress();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } catch (err) {
                document.getElementById('loader').innerText = "Load error. Please check your files.";
            }
        }

        // 3. UI Sync
        function updateUI() {
            const current = wordData[currentIndex];
            // Path: part1/1.jpg, part2/1.jpg...
            document.getElementById('card-img').src = `part${currentPart}/${current.imgId}.jpg`;
            document.getElementById('card-zh').innerText = current.text;
            document.getElementById('card-py').innerText = pinyin(current.text);
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${wordData.length}`;
            document.getElementById('card').classList.remove('is-flipped');
            document.getElementById('score-btns').style.visibility = 'hidden';
        }

        // 4. Learning Logic
        function toggleFlip() {
            const card = document.getElementById('card');
            card.classList.toggle('is-flipped');
            if (card.classList.contains('is-flipped')) {
                document.getElementById('score-btns').style.visibility = 'visible';
                setTimeout(() => speak(), 300);
            }
        }

        function changeCard(step) {
            currentIndex = (currentIndex + step + wordData.length) % wordData.length;
            updateUI();
            saveProgress();
        }

        function markCard(type) {
            const word = wordData[currentIndex].text;
            scores.mastered = scores.mastered.filter(i => i !== word);
            scores.review = scores.review.length > 0 ? scores.review.filter(i => i !== word) : [];
            
            scores[type].push(word);
            updateScoreDisplay();
            localStorage.setItem('flashcard_scores', JSON.stringify(scores));
            
            // Auto move to next after selection
            setTimeout(() => changeCard(1), 500);
        }

        function updateScoreDisplay() {
            document.getElementById('mastered-count').innerText = scores.mastered.length;
            document.getElementById('review-count').innerText = scores.review.length;
        }

        function saveProgress() {
            localStorage.setItem('flashcard_part', currentPart);
            localStorage.setItem('flashcard_index', currentIndex);
        }

        function switchPart(val) {
            loadContent(val, true);
        }

        function resetProgress() {
            if (confirm("Reset all progress and score history? This cannot be undone.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function speak(e) {
            if (e) e.stopPropagation();
            const utter = new SpeechSynthesisUtterance(wordData[currentIndex].text);
            utter.lang = 'zh-CN';
            utter.rate = 0.6; // Kid-friendly speed
            window.speechSynthesis.speak(utter);
        }

        // Hotkeys
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeCard(1);
            if (e.key === "ArrowLeft") changeCard(-1);
            if (e.key === " ") { e.preventDefault(); toggleFlip(); }
        });

        window.onload = init;
    </script>
</body>
</html>
